<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>One-Page Resume Template</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @page {
        size: A4;
        margin: 10mm;
      }

      :root {
        --resume-body-size: 13px;
        --resume-body-line: 1.45;
        --resume-section-size: 14px;
        --resume-meta-size: 12px;
      }

      html,
      body {
        print-color-adjust: exact;
        -webkit-print-color-adjust: exact;
      }
    </style>
  </head>
  <body class="bg-stone-100 text-slate-900">
    <main class="mx-auto my-6 min-h-[297mm] w-[210mm] bg-white px-8 py-7 shadow-sm print:my-0 print:min-h-0 print:w-auto print:shadow-none">
      <header class="border-b border-slate-200 pb-4">
        <div class="flex items-start justify-between gap-6">
          <div>
            <h1 class="text-[28px] font-semibold tracking-tight">{{NAME}}</h1>
            <p class="mt-1.5 text-[13px] leading-[1.45] text-slate-600">{{TITLE_OR_TAGLINE}}</p>
          </div>
          <div class="space-y-1 text-right text-[12px] leading-[1.4] text-slate-600">
            <p>{{EMAIL}}</p>
            <p>{{PHONE}}</p>
            <p>{{LOCATION}}</p>
            <p>{{LINKS}}</p>
          </div>
        </div>
      </header>

      <div class="mt-4 grid grid-cols-[0.76fr_1.54fr] gap-7">
        <aside class="space-y-5">
          <section>
            <h2 class="text-[14px] font-semibold uppercase tracking-[0.16em] text-slate-500">SUMMARY</h2>
            <p class="mt-1.5 text-[13px] leading-[1.45] text-slate-700">{{SUMMARY}}</p>
          </section>

          <section>
            <h2 class="text-[14px] font-semibold uppercase tracking-[0.16em] text-slate-500">EDUCATION</h2>
            <div class="mt-2 space-y-2.5 text-[13px] leading-[1.45] text-slate-700">
              {{EDUCATION_ITEMS}}
            </div>
          </section>

          <section>
            <h2 class="text-[14px] font-semibold uppercase tracking-[0.16em] text-slate-500">SKILLS</h2>
            <p class="mt-2 text-[13px] leading-[1.45] text-slate-700">{{SKILLS}}</p>
          </section>

          <section>
            <h2 class="text-[14px] font-semibold uppercase tracking-[0.16em] text-slate-500">OPTIONAL</h2>
            <p class="mt-2 text-[13px] leading-[1.45] text-slate-700">{{OPTIONAL_SECTION}}</p>
          </section>
        </aside>

        <section class="space-y-5">
          <section>
            <h2 class="text-[14px] font-semibold uppercase tracking-[0.16em] text-slate-500">EXPERIENCE</h2>
            <div class="mt-2 space-y-3.5 text-[13px] leading-[1.45] text-slate-700">
              {{EXPERIENCE_ITEMS}}
            </div>
          </section>

          <section>
            <h2 class="text-[14px] font-semibold uppercase tracking-[0.16em] text-slate-500">SELECTED PROJECTS</h2>
            <div class="mt-2 space-y-3.5 text-[13px] leading-[1.45] text-slate-700">
              {{PROJECT_ITEMS}}
            </div>
          </section>
        </section>
      </div>
    </main>
  </body>
</html>
